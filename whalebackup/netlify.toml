[build]
  functions = "netlify/functions"
  publish = "."

# El frontend le pega a /api/algo -- Netlify sirve las functions en
# /.netlify/functions/algo por default. Estos redirects hacen que
# /api/* funcione sin tener que cambiar ningún fetch() del HTML.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# refresh-trades no lo llama el navegador -- lo dispara un cron externo
# (cron-job.org u otro) pegándole directo a esta URL cada 1 min:
#   https://tu-sitio.netlify.app/.netlify/functions/refresh-trades
# (funciona igual a través de /api/refresh-trades también, gracias al redirect de arriba)
